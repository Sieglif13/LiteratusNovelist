<div class="auth-wrapper">
  <div class="glass-panel login-box">
    <h2>Bienvenido a Literatus</h2>
    <p class="subtitle">Desbloquea el mundo inmersivo de la lectura interactiva.</p>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label>Nombre de Usuario</label>
        <input type="text" class="glass-input" formControlName="username" placeholder="Ingresa tu usuario">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" class="glass-input" formControlName="password" placeholder="••••••••">
      </div>

      <div class="error-banner" *ngIf="errorMsg">
        {{ errorMsg }}
      </div>

      <button type="submit" class="glass-btn" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Conectando...' : 'Iniciar Sesión' }}
      </button>

    </form>

    <div class="footer-link">
      <span>¿No tienes una cuenta? <a routerLink="/register">Regístrate gratis</a></span>
    </div>
  </div>
</div>
